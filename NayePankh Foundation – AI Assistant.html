<!DOCTYPE html>

<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NayePankh Foundation – AI Assistant</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 20px;
}
.page-title {
  font-size: 13px; color: #2e7d52; font-weight: 600;
  letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 12px; text-align: center;
}
.wrapper {
  width: 420px; max-width: 100%;
  border-radius: 20px; overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.15);
  display: flex; flex-direction: column;
  height: 580px; background: #fff;
}
.header {
  background: #1a7a4a;
  padding: 14px 18px;
  display: flex; align-items: center; gap: 12px;
  flex-shrink: 0;
}
.avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.hinfo .name { color: #fff; font-size: 15px; font-weight: 600; }
.hinfo .sub  { color: rgba(255,255,255,0.75); font-size: 11px; margin-top: 2px; }
.online-dot { width: 8px; height: 8px; background: #4cff91; border-radius: 50%; display: inline-block; margin-right: 5px; }
#messages {
  flex: 1; overflow-y: auto; padding: 14px 14px 6px;
  display: flex; flex-direction: column; gap: 10px;
  background: #f7faf8;
}
.msg { display: flex; gap: 8px; max-width: 85%; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.bot  { align-self: flex-start; }
.bubble { padding: 10px 13px; font-size: 13.5px; line-height: 1.6; border-radius: 16px; }
.msg.user .bubble { background: #1a7a4a; color: #fff; border-bottom-right-radius: 3px; }
.msg.bot  .bubble { background: #fff; color: #222; border: 1px solid #e0e8e3; border-bottom-left-radius: 3px; }
.bot-icon {
  width: 28px; height: 28px; border-radius: 50%;
  background: #1a7a4a; color: white; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 2px;
}
.typing { display: flex; gap: 4px; align-items: center; padding: 2px 0; }
.typing span { width: 6px; height: 6px; background: #aaa; border-radius: 50%; animation: bounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
.sugs {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 8px 14px; background: #fff;
  border-top: 1px solid #eef2ef; flex-shrink: 0;
}
.sug {
  font-size: 11.5px; padding: 5px 10px;
  border: 1px solid #c5ddd0; border-radius: 12px;
  background: #f0f9f4; color: #1a7a4a; cursor: pointer; transition: all 0.15s;
}
.sug:hover { background: #1a7a4a; color: #fff; border-color: #1a7a4a; }
.input-row {
  display: flex; gap: 8px; align-items: center;
  padding: 10px 12px; background: #fff;
  border-top: 1px solid #eef2ef; flex-shrink: 0;
}
#user-input {
  flex: 1; padding: 9px 14px; border-radius: 20px;
  border: 1.5px solid #c5ddd0; font-size: 13.5px;
  outline: none; background: #f7faf8; color: #222; transition: border 0.2s;
}
#user-input:focus { border-color: #1a7a4a; background: #fff; }
#send-btn {
  width: 38px; height: 38px; border-radius: 50%;
  background: #1a7a4a; border: none; cursor: pointer;
  color: white; font-size: 16px; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s;
}
#send-btn:hover { background: #145e38; }
</style>
</head>
<body>

<p class="page-title">🌱 NayePankh Foundation</p>
<div class="wrapper">
  <div class="header">
    <div class="avatar">🤖</div>
    <div class="hinfo">
      <div class="name">NayePankh Assistant</div>
      <div class="sub"><span class="online-dot"></span>AI-powered · Always here to help</div>
    </div>
  </div>

  <div id="messages">
    <div class="msg bot">
      <div class="bot-icon">🤖</div>
      <div class="bubble">Namaste! 🙏 I'm the NayePankh Foundation assistant. Ask me about our mission, how to volunteer, donate, or join our internship programs!</div>
    </div>
  </div>

  <div class="sugs">
    <button class="sug" onclick="quickSend(&#39;What does NayePankh Foundation do?&#39;)">What is NayePankh?</button>
    <button class="sug" onclick="quickSend(&#39;How can I volunteer?&#39;)">How to volunteer?</button>
    <button class="sug" onclick="quickSend(&#39;How can I donate?&#39;)">How to donate?</button>
    <button class="sug" onclick="quickSend(&#39;Tell me about internship opportunities&#39;)">Internships</button>
  </div>

  <div class="input-row">
    <input id="user-input" type="text" placeholder="Ask me anything..." onkeydown="if(event.key===&#39;Enter&#39;) sendMessage()">
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
const KB = [
  {
    id: 'identity',
    match: q => /who are you|what are you|introduce yourself|your name|tell me about yourself/.test(q),
    ans: "I'm the <strong>NayePankh Foundation AI Assistant</strong> 🤖 — here to answer your questions about the foundation, our mission, volunteering, donations, internships, and more. Think of me as your guide to everything NayePankh! What would you like to know?"
  },
  {
    id: 'mission',
    match: q => /what does|what do you do|mission|purpose|goal|objective|work|about nayepankh|what is nayepankh/.test(q),
    ans: "NayePankh Foundation works to uplift underprivileged communities across India 🌱 We provide <strong>free food, sanitary pads, clothes, and education</strong> to those in need. Our motto is <em>\"Think global, Act local\"</em> — and we've already impacted over <strong>2 lakh (200,000) people</strong>!"
  },
  {
    id: 'about',
    match: q => /^(about|nayepankh|foundation|ngo|organisation|organization)$|tell me more|background|history|overview/.test(q),
    ans: "NayePankh Foundation is one of <strong>India's biggest student-led NGOs</strong>, registered under the UP Government and certified with 80G & 12A status 🏛️ Founded by <strong>Prashant Shukla</strong>, it operates in Kanpur, Ghaziabad, and several other cities. We've served over <strong>2 lakh people</strong> and continue to grow!"
  },
  {
    id: 'founder',
    match: q => /founder|prashant|shukla|president|who started|who created|who founded|who built/.test(q),
    ans: "NayePankh Foundation was founded by <strong>Prashant Shukla</strong>, who serves as its Founder & President 💪 His guiding belief: <em>\"If we all do something, then together there is no problem that we cannot solve!\"</em> Under his leadership, NayePankh has become one of India's most impactful student-driven NGOs."
  },
  {
    id: 'volunteer',
    match: q => /volunteer|join|become a member|be part|sign up|register as|how to join|how can i join/.test(q),
    ans: "Joining NayePankh is easy and completely welcome! 🤝 Visit <strong>nayepankh.com</strong> and click <em>Join Us</em>. You can contribute your time, skills, or creative ideas — whether you care about education, healthcare, or community outreach, there's a role for you here!"
  },
  {
    id: 'donate',
    match: q => /donat|give money|fund|financial|support us|contribute money|how to pay|payment|help financially/.test(q),
    ans: "Your support truly matters! 💚 Donate at <strong>nayepankh.com/donate</strong>. Since we're <strong>80G & 12A certified</strong>, your donation is fully <strong>tax-exempt</strong> under the Indian Income Tax Act. Every rupee goes towards providing food, education, and essentials to underprivileged families."
  },
  {
    id: 'internship',
    match: q => /intern|internship|stipend|apply|application|program|opportunity|technical role|work with/.test(q),
    ans: "NayePankh offers <strong>beginner-friendly technical internships</strong> in Python, AI, Full Stack, Java, Data Analytics, UI/UX, Machine Learning, and more! 💻 They're open to students at all skill levels. To apply, fill the form on our website or email us at <strong>contact@nayepankh.com</strong>."
  },
  {
    id: 'services',
    match: q => /food|sanitary|clothes|clothing|education|what do you provide|what do you give|services|initiatives|programs|activities/.test(q),
    ans: "NayePankh runs several community initiatives 🌟<br/>🍱 <strong>Free food drives</strong> for the hungry<br/>🩺 <strong>Sanitary pad distribution</strong> for women<br/>👕 <strong>Clothes donation</strong> campaigns<br/>📚 <strong>Free education</strong> support for children<br/>All of this is made possible by our amazing volunteers and donors!"
  },
  {
    id: 'contact',
    match: q => /contact|email|phone|call|reach|number|get in touch|speak to|talk to/.test(q),
    ans: "You can reach us anytime! 📬<br/>📧 <strong>contact@nayepankh.com</strong><br/>📞 <strong>+91-8318500748</strong><br/>🌐 <strong>nayepankh.com</strong><br/>Our team is always happy to help with any queries about volunteering, donations, or internships."
  },
  {
    id: 'social',
    match: q => /instagram|linkedin|youtube|facebook|twitter|social media|follow|handle|channel/.test(q),
    ans: "Stay connected with us on social media! 📱<br/>📸 Instagram: <strong>@nayepankhfoundation</strong><br/>💼 LinkedIn: <strong>linkedin.com/company/nayepankh</strong><br/>▶️ YouTube: <strong>@nayepankhfoundation</strong><br/>📘 Facebook: <strong>@nayepankhfoundation</strong><br/>Follow us for updates, campaigns, and volunteer stories!"
  },
  {
    id: 'certificate',
    match: q => /certificate|certified|registered|legal|80g|12a|tax|government|govt/.test(q),
    ans: "NayePankh Foundation is <strong>fully registered and certified</strong> 🏛️ We hold UP Government registration along with <strong>80G and 12A certifications</strong>, which means all donations are legally tax-exempt in India. View our certificates at <strong>nayepankh.com/our-certificates</strong>."
  },
  {
    id: 'location',
    match: q => /city|location|where|kanpur|ghaziabad|operate|based|headquarters|cities/.test(q),
    ans: "NayePankh Foundation is currently active in <strong>Kanpur, Ghaziabad</strong>, and several other cities across India 📍 We're always expanding! If you'd like to bring NayePankh to your city, drop us a message at <strong>contact@nayepankh.com</strong>."
  },
  {
    id: 'impact',
    match: q => /impact|how many|lakh|people helped|achievement|milestone|success|numbers|stats/.test(q),
    ans: "We're proud of the impact we've made! 🎉 NayePankh Foundation has helped over <strong>2 lakh (200,000) underprivileged people</strong> through food drives, education support, clothes donations, and more. And we're just getting started — with your support, we can do so much more!"
  },
  {
    id: 'website',
    match: q => /website|site|web|link|url|page|online/.test(q),
    ans: "You can find everything about us online! 🌐<br/><strong>nayepankh.com</strong> — Main website<br/><strong>nayepankh.com/about-us</strong> — Our story<br/><strong>nayepankh.com/donate</strong> — Donate<br/><strong>nayepankh.com/our-certificates</strong> — View certifications"
  },
  {
    id: 'thanks',
    match: q => /^(thank|thanks|thank you|thx|ty|great|awesome|cool|nice|good|ok|okay|perfect|got it|understood)/.test(q),
    ans: "You're very welcome! 😊 It's our pleasure to help. If you have any more questions about NayePankh Foundation, feel free to ask anytime!"
  },
  {
    id: 'greet',
    match: q => /^(hi|hello|hey|namaste|hii|helo|howdy|sup|good morning|good evening|good afternoon)/.test(q),
    ans: "Namaste! 🙏 Welcome to the NayePankh Foundation assistant. I'm here to help you learn about our mission, volunteering opportunities, donations, and internships. What would you like to know today?"
  },
];

const OUT_OF_SCOPE = [
  "That's a bit outside my area! 😊 I'm built to answer questions about <strong>NayePankh Foundation</strong> — our mission, volunteering, donations, or internships. Try asking me about one of those!",
  "I can't help with that one, but I'd love to tell you about <strong>NayePankh Foundation</strong>! 🌱 Ask me how to volunteer, donate, or apply for an internship.",
  "Hmm, that's beyond my scope! 😄 I'm the NayePankh assistant — ask me anything about our work, our team, or how you can get involved.",
  "I'm not the right bot for that! 💚 But I can tell you all about NayePankh Foundation — what we do, how to support us, and more. What would you like to know?",
];

function getAnswer(text) {
  const q = text.toLowerCase().trim();
  for (const entry of KB) {
    if (entry.match(q)) return entry.ans;
  }
  return OUT_OF_SCOPE[Math.floor(Math.random() * OUT_OF_SCOPE.length)];
}

function quickSend(text) {
  document.getElementById('user-input').value = text;
  sendMessage();
}

function sendMessage() {
  const inp = document.getElementById('user-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  addMsg('user', text);
  const typing = addTyping();
  setTimeout(() => {
    typing.remove();
    addMsg('bot', getAnswer(text));
  }, 800 + Math.random() * 400);
}

function addMsg(role, html) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = role === 'bot'
    ? `<div class="bot-icon">🤖</div><div class="bubble">${html}</div>`
    : `<div class="bubble">${html}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function addTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `<div class="bot-icon">🤖</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}
</script>


</body></html>
